<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fjelltur</title>
  <link rel="stylesheet" href="./fjelltur.css">
</head>
<body class="login-body">

  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 26 L10 7 L14 16 L19 9 L26 26 Z" fill="none" stroke="rgba(154,184,144,0.85)" stroke-width="1.6" stroke-linejoin="round"/>
          <path d="M10 7 L14 16 L19 9" fill="none" stroke="#6fa05e" stroke-width="1.6" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1>Fjelltur</h1>
      <p>Logg toppturer med venner</p>
    </div>

    <div class="tab-row">
      <button class="tab-btn active" id="btnLogin" onclick="visFane('login')">Logg inn</button>
      <button class="tab-btn" id="btnRegister" onclick="visFane('register')">Registrer</button>
    </div>

    <div class="form-box">
      <form id="loginForm" class="form-panel active" action="/login" method="POST">
        <div class="field">
          <label>Brukernavn</label>
          <input type="text" name="username" placeholder="Ditt brukernavn" autocomplete="username">
        </div>
        <div class="field">
          <label>Passord</label>
          <input type="password" name="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button type="submit" class="submit-btn">Logg inn</button>
      </form>

      <form id="registerForm" class="form-panel" onsubmit="registrer(event)">
        <div class="field">
          <label>Brukernavn</label>
          <input type="text" id="reg_username" placeholder="Velg brukernavn" autocomplete="username">
        </div>
        <div class="field">
          <label>Passord</label>
          <input type="password" id="reg_password" placeholder="••••••••" autocomplete="new-password">
        </div>
        <div class="field">
          <label>E-post</label>
          <input type="email" id="reg_epost" placeholder="din@epost.no" autocomplete="email">
        </div>
        <button type="submit" class="submit-btn">Opprett konto</button>
      </form>

      <div id="loginFeedback"></div>
    </div>
  </div>

  <script>
    function visFane(fane) {
      document.getElementById('loginForm').classList.toggle('active', fane === 'login');
      document.getElementById('registerForm').classList.toggle('active', fane === 'register');
      document.getElementById('btnLogin').classList.toggle('active', fane === 'login');
      document.getElementById('btnRegister').classList.toggle('active', fane === 'register');
      document.getElementById('loginFeedback').textContent = '';
    }

    async function registrer(e) {
      e.preventDefault();
      const feedback = document.getElementById('loginFeedback');
      feedback.textContent = '';

      const username = document.getElementById('reg_username').value.trim();
      const password = document.getElementById('reg_password').value;
      const epost    = document.getElementById('reg_epost').value.trim();

      try {
        const res = await fetch('/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, epost })
        });

        if (res.redirected) { window.location.href = res.url; return; }
        if (res.ok)         { window.location.href = '/';     return; }

        const data = await res.json();
        feedback.textContent = data.error || 'Kunne ikke opprette bruker.';
      } catch (err) {
        feedback.textContent = 'Nettverksfeil – prøv igjen.';
      }
    }
  </script>
</body>
</html>
